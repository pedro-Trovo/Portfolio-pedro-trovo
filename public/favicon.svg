<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glassGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d15"/>
      <stop offset="100%" stop-color="#080810"/>
    </linearGradient>
    <linearGradient id="glareGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00c0ff" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#00c0ff" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(60, 60)">
    <rect x="-40" y="-40" width="80" height="80" rx="6"
          transform="rotate(45)"
          fill="url(#glassGradient)"
          stroke="#151520"
          stroke-width="1"/>

    <path d="M-28 -28 L0 -56 L28 -28 L0 0 Z"
          fill="url(#glareGradient)"
          transform="rotate(45)"/>

    <rect x="-30" y="-30" width="60" height="60" rx="4"
          transform="rotate(45)"
          fill="none"
          stroke="#00c0ff"
          stroke-width="2.5"
          stroke-opacity="0.9"
          filter="url(#neonGlow)"/>

    <text x="0" y="13"
          text-anchor="middle"
          font-family="Inter, system-ui, sans-serif"
          font-weight="700"
          font-size="46"
          fill="#00c0ff"
          filter="url(#neonGlow)"
          letter-spacing="-1">
      P
    </text>

    <text x="0" y="13"
          text-anchor="middle"
          font-family="Inter, system-ui, sans-serif"
          font-weight="700"
          font-size="46"
          fill="#ffffff"
          letter-spacing="-1">
      P
    </text>

    <circle cx="22" cy="-22" r="2.5" fill="#00c0ff" filter="url(#neonGlow)"/>
  </g>
</svg>