  <text x="80" y="205" font-family="'Plus Jakarta Sans','Inter','Segoe UI',sans-serif" font-weight="300" font-size="52" fill="#F1F5F9" letter-spacing="-0.5">pedro</text>
  <text x="80" y="270" font-family="'Plus Jakarta Sans','Inter','Segoe UI',sans-serif" font-weight="700" font-size="52" fill="#F1F5F9" letter-spacing="-0.5">TROVO</text>

