<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="400" fill="#0F172A"/>

  <!-- Background </> watermark -->
  <g opacity="0.03" stroke="#62BBC1" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="300,130 380,200 300,270"/>
    <line x1="410" y1="130" x2="490" y2="270"/>
    <polyline points="520,130 440,200 520,270"/>
  </g>

  <!-- Decorative line -->
  <line x1="100" y1="145" x2="300" y2="145" stroke="#62BBC1" stroke-width="2" opacity="0.3"/>
  <line x1="100" y1="147" x2="260" y2="147" stroke="#818CF8" stroke-width="1.5" opacity="0.2"/>

  <!-- </> tag -->
  <g stroke="#62BBC1" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="100,185 115,200 100,215"/>
    <line x1="122" y1="185" x2="137" y2="215"/>
    <polyline points="144,185 159,200 144,215"/>
  </g>

  <!-- Name -->
  <text x="175" y="208" font-family="'Plus Jakarta Sans','Inter','Segoe UI',sans-serif" font-weight="300" font-size="44" fill="#F1F5F9" letter-spacing="-0.5">pedro trovo</text>

  <!-- Underscore accent -->
  <rect x="100" y="230" width="60" height="3" rx="1.5" fill="#62BBC1"/>

  <!-- Subtitle -->
  <text x="100" y="278" font-family="'Inter','Segoe UI',sans-serif" font-weight="400" font-size="18" fill="#94A3B8" letter-spacing="2">BACKEND DEVELOPER</text>

  <!-- Accent dots -->
  <circle cx="1100" cy="180" r="4" fill="#62BBC1" opacity="0.4"/>
  <circle cx="1120" cy="180" r="3" fill="#818CF8" opacity="0.3"/>
  <circle cx="1135" cy="180" r="2" fill="#F1F5F9" opacity="0.2"/>
</svg>
